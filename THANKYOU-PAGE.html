<!DOCTYPE HTML>
<html>
	<head>
		<title>Thank You For Contact Me</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<style>
			/* Mengatur tampilan agar berada di tengah layar secara vertikal & horizontal */
			body {
				background-color: #D1F4FF; /* Warna background biru mudamu */
				color: #585858; /* Warna teks abu-abu gelapmu */
				font-family: "Source Sans Pro", Helvetica, sans-serif;
				display: block;
				text-align: center;
				margin: 0;
				padding: 100px 20px;
				box-sizing: border-box;
			}
			
			/* Kotak putih transparan sebagai wadah teks */
			.container {
				max-width: 600px;
				margin: 0 auto;
				background: rgba(255, 255, 255, 0.4);
				padding: 50px 30px;
				border-radius: 12px;
				box-shadow: 0 10px 30px rgba(0,0,0,0.03);
			}
			
			h1 {
				font-size: 2.5em;
				margin-bottom: 15px;
				font-weight: 700;
			}
			
			p {
				font-size: 1.2em;
				line-height: 1.6;
				margin-bottom: 40px;
			}
			
			/* Tombol untuk kembali ke halaman portfolio utama */
			.button {
				display: inline-block;
				background-color: #585858;
				color: #D1F4FF !important;
				text-decoration: none;
				padding: 15px 35px;
				font-weight: bold;
				border-radius: 6px;
				letter-spacing: 1px;
				text-transform: uppercase;
				font-size: 0.9em;
				transition: all 0.3s ease;
			}
			
			/* Efek saat tombol diarahkan kursor */
			.button:hover {
				background-color: #333333;
				transform: translateY(-2px);
			}
		</style>
	</head>
	<body>

		<div class="container">
			<h1>Thank You!</h1>
			
			<p>Thank you for contacting me, I will reply to your message very soon.</p>
			
			<a href="index.html" class="button">Back to Home</a>
		</div>

	</body>
</html>
